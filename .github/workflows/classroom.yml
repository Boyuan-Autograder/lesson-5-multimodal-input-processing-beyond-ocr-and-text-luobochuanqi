name: Autograding

on:
  push:
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run grading script
        id: grading
        env:
          MOONSHOT_API_KEY: grading-placeholder
        run: uv run python tests/grade.py

      - name: Publish results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: grading-results.xml
